name: Test Docker Image

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - base_image: "redup4ai/python:3.14.2-nogil-slim"
          tag_suffix: "3.14.2-nogil-slim"
        - base_image: "redup4ai/python:3.14.2-nogil-ubi18-1.8.5"
          tag_suffix: "3.14.2-nogil-ubi18-1.8.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: ${{ secrets.DOCKERHUB_USER }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
